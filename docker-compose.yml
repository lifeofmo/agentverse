version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentverse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentverse-dev-CHANGE-IN-PROD}
      POSTGRES_DB: agentverse
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentverse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (task queue broker) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── AgentVerse API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-agentverse-dev-secret-CHANGE-IN-PROD}
      - DATABASE_URL=postgresql+asyncpg://agentverse:${POSTGRES_PASSWORD:-agentverse-dev-CHANGE-IN-PROD}@postgres/agentverse
      - DB_PATH=/data/agents.db
      - REDIS_URL=redis://redis:6379
      - API_BASE_URL=${API_BASE_URL:-http://backend:8000}
      - AGENT_SERVER_URL=http://agents:8001
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - X402_ENABLED=${X402_ENABLED:-false}
      - X402_NETWORK=${X402_NETWORK:-base-sepolia}
      - X402_FACILITATOR=${X402_FACILITATOR:-https://x402.org/facilitator}
    volumes:
      - db_data:/data                    # kept for SQLite fallback
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Pipeline Worker (arq) ───────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m arq backend.worker.WorkerSettings
    environment:
      - DATABASE_URL=postgresql+asyncpg://agentverse:${POSTGRES_PASSWORD:-agentverse-dev-CHANGE-IN-PROD}@postgres/agentverse
      - DB_PATH=/data/agents.db
      - REDIS_URL=redis://redis:6379
      - AGENT_SERVER_URL=http://agents:8001
    volumes:
      - db_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Agent Server (demo agents) ──────────────────────────────────────────────
  agents:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn agents.server:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # These must be the public-facing URLs (browser connects to them directly)
      - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${PUBLIC_WS_URL:-ws://localhost:8000/ws}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  db_data:
